plugins:
  - rubocop-rspec
  - rubocop-rails
  - rubocop-factory_bot
  - rubocop-performance

AllCops:
  TargetRubyVersion: 4.0
  DisabledByDefault: false
  NewCops: enable

Layout/FirstHashElementIndentation:
  Enabled: false

Metrics/MethodLength:
  CountAsOne:
    - hash

Style/RedundantReturn:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: false
