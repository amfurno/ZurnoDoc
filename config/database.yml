# PostgreSQL. Versions 9.3 and up are supported.
#   gem install pg
#
#   Ensure the PostgreSQL gem is defined in your Gemfile
#   gem "pg"
#
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: db
  username: postgres
  password: postgres

development:
  <<: *default
  database: zurnoDoc_development

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: zurnoDoc_test

# Production uses separate connections for the Solid suite (queue, cache, cable).
# POSTGRES_HOST, POSTGRES_USER, and POSTGRES_PASSWORD are injected by Kamal (see config/deploy.yml).
production:
  primary: &production_default
    adapter: postgresql
    encoding: unicode
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
    connect_timeout: 5
    checkout_timeout: 5
    host: <%= ENV.fetch("POSTGRES_HOST", "localhost") %>
    username: <%= ENV.fetch("POSTGRES_USER", "postgres") %>
    password: <%= ENV["POSTGRES_PASSWORD"] %>
    database: zurno_doc_production
  queue:
    <<: *production_default
    database: zurno_doc_queue
  cache:
    <<: *production_default
    database: zurno_doc_cache
  cable:
    <<: *production_default
    database: zurno_doc_cable
