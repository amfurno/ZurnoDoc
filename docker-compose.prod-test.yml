services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      POSTGRES_HOST: db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SOLID_QUEUE_IN_PUMA: "true"
      RAILS_ALLOWED_HOST: "localhost"
    networks:
      - prod-test-network

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - prod-test-network

  nginx:
    image: nginx:alpine
    depends_on:
      - web
    ports:
      - "3000:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
      - ./config/nginx/local.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - prod-test-network

networks:
  prod-test-network:
    driver: bridge
